# ─────────────────────────────────────────────────────────────
# Test Configuration
# Override any value by setting an environment variable:
#   base.url  →  BASE_URL
#   browser   →  BROWSER
# ─────────────────────────────────────────────────────────────

# Target application URL
base.url=https://www.saucedemo.com

# Browser: chrome | firefox | edge
browser=chrome

# Wait configuration (seconds / ms)
wait.timeout.seconds=15
wait.polling.ms=500

# Headless mode (overridden automatically by CI via HEADLESS env var)
headless=false

# Test credentials (use env vars for sensitive values in CI)
# e.g. export TEST_USERNAME=standard_user
test.username=standard_user
test.password=secret_sauce
